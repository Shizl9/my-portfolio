<div class="container text-center mt-5 p-4 box">
  <table class="table table-bordered">
    <thead>
      <tr>
        <th>order</th>
        <th>Id</th>
        <th>Name</th>
        <th>Price</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let product of products; let i = index">
        <td>{{ i + 1 }}</td>
        <td>{{ product.id }}</td>
        <td>{{ product.name }}</td>
        <td>{{ product.price }}</td>
        <td>{{ product.used ? 'Used' : 'New' }}</td>
      </tr>
    </tbody>
  </table>
</div>
